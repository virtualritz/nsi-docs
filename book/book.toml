[book]
title = "ɴsɪ — A Flexible, Modern API for Renderers"
authors = ["Olivier Paquet", "Aghiles Kheffache", "François Colbert", "Berj Bannayan"]
language = "en"
src = "src"

[build]
build-dir = "build"

[output.html]
default-theme = "light"
preferred-dark-theme = "navy"
smart-punctuation = true
additional-css = ["./mdbook-admonish.css", "src/css/custom.css"]

[output.html.search]
enable = true

[preprocessor.admonish]
command = "mdbook-admonish"
assets_version = "3.1.0" # do not edit: managed by `mdbook-admonish install`
